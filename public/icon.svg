<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0a0a0a"/>

  <!-- Paw pad (main/large) -->
  <ellipse cx="256" cy="310" rx="70" ry="60" fill="#ef4444"/>

  <!-- Paw toes -->
  <ellipse cx="170" cy="220" rx="35" ry="42" fill="#ef4444" transform="rotate(-15 170 220)"/>
  <ellipse cx="230" cy="175" rx="32" ry="40" fill="#ef4444" transform="rotate(-5 230 175)"/>
  <ellipse cx="282" cy="175" rx="32" ry="40" fill="#ef4444" transform="rotate(5 282 175)"/>
  <ellipse cx="342" cy="220" rx="35" ry="42" fill="#ef4444" transform="rotate(15 342 220)"/>

  <!-- Warning triangle on paw pad -->
  <polygon points="256,265 232,320 280,320" fill="#0a0a0a" stroke="none"/>
  <!-- Exclamation mark -->
  <rect x="252" y="278" width="8" height="24" rx="2" fill="#fbbf24"/>
  <circle cx="256" cy="312" r="4" fill="#fbbf24"/>
</svg>
